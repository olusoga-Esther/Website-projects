<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color palette Generator</title>
    <link rel="stylesheet" href="colorgenerator.css"
</head>
<body>
    <div class="container">
        <h1>Color Palette Generator</h1>
        <button id="generate-btn">
            <i class="fas fa-sync-alt"></i>
            Generate Palette
        </button>

        <div class="palette-container">
            <!--Color box 1-->
            <div class="color-box">
             <div class="color" style="background-color: #e1f5fe;"></div>
             <div class="color-info">
                <span class="hex-value">#e1f5fe</span>
                <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
             </div>   
            </div>
            <!--Color box 2-->
            <div class="color-box">
             <div class="color" style="background-color: #b3e5fc;"></div>
             <div class="color-info">
                <span class="hex-value">#b3e5fc</span>
                <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
             </div>   
            </div>
            <!--Color box 3-->
            <div class="color-box">
             <div class="color" style="background-color: #949b17;"></div>
             <div class="color-info">
                <span class="hex-value">#949b17</span>
                <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
             </div>   
            </div>
            <!--Color box 4-->
            <div class="color-box">
             <div class="color" style="background-color: #4935e0;"></div>
             <div class="color-info">
                <span class="hex-value">#4935e0</span>
                <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
             </div>   
            </div>
            <!--Color box 5-->
            <div class="color-box">
             <div class="color" style="background-color: #30e275;"></div>
             <div class="color-info">
                <span class="hex-value">#30e275</span>
                <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
             </div>   
            </div>
        </div>

    </div>
    <script src="colorgenerator.js"></script>
</body>
</html>
