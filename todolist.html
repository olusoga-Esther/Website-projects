<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="todolist.css">
</head>
<body>
 <div class="container">
    <h1>TO DO LIST</h1>

        <div class="board">
<!--To do List 1-->
            <div class="list" id="List1">
                <h2>To Do</h2>
                <div class="card" draggable="true" id="card1">Complete your classes online</div>
                <div class="card" draggable="true" id="card2">Take a nap</div>
                <div class="card" draggable="true" id="card3">Cook Dinner</div>
            </div>

            <!--To do List 2-->
            <div class="list" id="List2">
                <h2>In Progress</h2>
                <div class="card" draggable="true" id="card4">Clean the house</div>
            </div>

            <!--To do List 3-->
            <div class="list" id="List3">
                <h2>Completed</h2>
            </div>


        </div>
 </div>
    <script src="todolist.js"></script>
</body>
</html>
